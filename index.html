<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Command Center</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d1117">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;600;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0d1117;
            color: #e5e7eb;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .slim-text { font-weight: 100; }
        
        .glass-panel {
            background-color: rgba(31, 41, 55, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(75, 85, 99, 0.4);
        }

        .gcal-wrapper {
            position: relative;
            filter: invert(0.9) hue-rotate(180deg);
            opacity: 0.85;
            transition: opacity 0.3s;
        }
        .gcal-wrapper:hover { opacity: 1; }

        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
    </style>
</head>
<body class="antialiased p-4 sm:p-6" id="main-body">

    <div id="app" class="max-w-[1600px] mx-auto flex flex-col gap-8">
        
        <header class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- Local Clock -->
            <div class="lg:col-span-5 glass-panel p-6 rounded-2xl shadow-2xl flex flex-col justify-center">
                <h2 class="text-xs uppercase tracking-[0.2em] text-blue-400 font-semibold mb-2">Local Time</h2>
                <h1 id="local-time" class="text-6xl sm:text-7xl slim-text tracking-tighter text-white">--:--:--</h1>
                <p id="local-date" class="text-gray-400 font-light mt-1 text-lg">---</p>
                <p id="auth-status" class="text-[10px] text-gray-600 italic mt-4 uppercase tracking-tighter">Connecting...</p>
            </div>

            <!-- World Clocks Section -->
            <div class="lg:col-span-7 glass-panel p-6 rounded-2xl flex flex-col">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xs uppercase tracking-[0.2em] text-gray-400 font-semibold">Remote Operations</h2>
                    <button onclick="window.toggleClockSettings()" class="text-[10px] text-blue-400 hover:underline">Edit Clocks</button>
                </div>

                <div id="clock-settings" class="hidden mb-4 p-4 bg-gray-900/80 rounded-xl border border-gray-700 grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <p class="text-[10px] text-gray-500 uppercase font-bold">Clock 1 Location</p>
                        <select id="clk-zone-0" class="w-full bg-black border border-gray-700 p-2 rounded text-xs text-white outline-none"></select>
                    </div>
                    <div class="space-y-2">
                        <p class="text-[10px] text-gray-500 uppercase font-bold">Clock 2 Location</p>
                        <select id="clk-zone-1" class="w-full bg-black border border-gray-700 p-2 rounded text-xs text-white outline-none"></select>
                    </div>
                    <div class="sm:col-span-2">
                        <button onclick="window.saveClocks()" class="w-full bg-blue-600 hover:bg-blue-500 text-xs font-bold py-2 rounded transition text-white">Apply Clock Settings</button>
                    </div>
                </div>

                <div id="work-clocks-container" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
            </div>
        </header>

        <main>
            <!-- Expanded Calendar Display -->
            <section class="glass-panel rounded-2xl shadow-2xl overflow-hidden flex flex-col min-h-[700px]">
                <div class="p-4 border-b border-gray-700 flex justify-between items-center">
                    <h2 class="text-sm font-bold text-blue-400 uppercase tracking-widest">Main Calendar Display</h2>
                    <div class="flex gap-4 items-center">
                        <button onclick="window.refreshGCal()" title="Manual Sync" class="text-gray-500 hover:text-white transition">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        </button>
                        <button onclick="window.toggleGCalSettings()" class="text-[10px] text-blue-400 hover:underline">Setup ID</button>
                    </div>
                </div>
                
                <div id="gcal-settings" class="hidden p-4 bg-gray-900 border-b border-gray-700">
                    <input type="text" id="gcal-id" placeholder="Google Calendar ID (e.g. family@gmail.com)" class="w-full bg-black border border-gray-700 p-3 rounded text-sm text-white mb-2">
                    <button onclick="window.saveGCal()" class="w-full bg-blue-600 font-bold py-2 rounded text-xs text-white">Save & Connect</button>
                </div>

                <div class="flex-grow gcal-wrapper">
                    <iframe id="gcal-frame" src="" style="border: 0" width="100%" height="100%" frameborder="0" scrolling="no"></iframe>
                </div>
            </section>
        </main>

        <!-- Family Member Task Boards (Now with Integrated Add Task) -->
        <section class="glass-panel p-6 rounded-3xl shadow-2xl">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                <h2 class="text-xl font-light uppercase tracking-[0.2em] text-gray-300">Family Task Boards</h2>
                <button onclick="window.toggleTaskForm()" id="task-form-btn" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-full text-xs font-bold transition shadow-lg">+ New Task</button>
            </div>

            <!-- Task Form Integrated into Board Section -->
            <form id="add-task-form" class="hidden grid grid-cols-1 md:grid-cols-4 gap-4 bg-gray-900/50 p-6 rounded-2xl border border-gray-700 mb-8 animate-in fade-in slide-in-from-top-4 duration-300">
                <div class="md:col-span-2 space-y-1">
                    <label class="text-[10px] text-gray-500 uppercase font-bold px-1">Task Description</label>
                    <input type="text" id="task-text" placeholder="What needs doing?" required class="w-full bg-black border border-gray-700 p-3 rounded-xl text-sm text-white outline-none focus:border-blue-500">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] text-gray-500 uppercase font-bold px-1">Assignee</label>
                    <select id="task-assignee" class="w-full bg-black border border-gray-700 p-3 rounded-xl text-sm text-white outline-none focus:border-blue-500">
                        <option value="Mom">Mom</option>
                        <option value="Dad">Dad</option>
                        <option value="Son">Son</option>
                        <option value="Daughter">Daughter</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] text-gray-500 uppercase font-bold px-1">Due Date</label>
                    <input type="date" id="task-due" required class="w-full bg-black border border-gray-700 p-3 rounded-xl text-sm text-white outline-none focus:border-blue-500">
                </div>
                <div class="md:col-span-4 flex justify-end">
                    <button type="submit" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-xl text-xs transition">Save Task to Board</button>
                </div>
            </form>

            <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6" id="tasks-grid"></div>
        </section>

        <footer class="text-center py-6 opacity-30 text-[10px] uppercase tracking-widest">
            Family Command Center • v4.0 (Integrated Boards)
        </footer>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, doc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'family-pwa';
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let familyTasks = [];

        const TIMEZONES = [
            { label: "Amsterdam", zone: "Europe/Amsterdam" }, { label: "Anchorage", zone: "America/Anchorage" },
            { label: "Athens", zone: "Europe/Athens" }, { label: "Atlanta", zone: "America/New_York" },
            { label: "Auckland", zone: "Pacific/Auckland" }, { label: "Bangkok", zone: "Asia/Bangkok" },
            { label: "Beijing", zone: "Asia/Shanghai" }, { label: "Berlin", zone: "Europe/Berlin" },
            { label: "Bogota", zone: "America/Bogota" }, { label: "Boston", zone: "America/New_York" },
            { label: "Brisbane", zone: "Australia/Brisbane" }, { label: "Brussels", zone: "Europe/Brussels" },
            { label: "Buenos Aires", zone: "America/Argentina/Buenos_Aires" }, { label: "Cairo", zone: "Africa/Cairo" },
            { label: "Cape Town", zone: "Africa/Johannesburg" }, { label: "Chicago", zone: "America/Chicago" },
            { label: "Dallas", zone: "America/Chicago" }, { label: "Denver", zone: "America/Denver" },
            { label: "Dubai", zone: "Asia/Dubai" }, { label: "Dublin", zone: "Europe/Dublin" },
            { label: "Hong Kong", zone: "Asia/Hong_Kong" }, { label: "Honolulu", zone: "Pacific/Honolulu" },
            { label: "Istanbul", zone: "Europe/Istanbul" }, { label: "Jakarta", zone: "Asia/Jakarta" },
            { label: "Johannesburg", zone: "Africa/Johannesburg" }, { label: "Lagos", zone: "Africa/Lagos" },
            { label: "London", zone: "Europe/London" }, { label: "Los Angeles", zone: "America/Los_Angeles" },
            { label: "Madrid", zone: "Europe/Madrid" }, { label: "Manila", zone: "Asia/Manila" },
            { label: "Melbourne", zone: "Australia/Melbourne" }, { label: "Mexico City", zone: "America/Mexico_City" },
            { label: "Miami", zone: "America/New_York" }, { label: "Moscow", zone: "Europe/Moscow" },
            { label: "Mumbai", zone: "Asia/Kolkata" }, { label: "Nairobi", zone: "Africa/Nairobi" },
            { label: "New York", zone: "America/New_York" }, { label: "Paris", zone: "Europe/Paris" },
            { label: "Perth", zone: "Australia/Perth" }, { label: "Phoenix", zone: "America/Phoenix" },
            { label: "Prague", zone: "Europe/Prague" }, { label: "Rio de Janeiro", zone: "America/Sao_Paulo" },
            { label: "Rome", zone: "Europe/Rome" }, { label: "Santiago", zone: "America/Santiago" },
            { label: "Sao Paulo", zone: "America/Sao_Paulo" }, { label: "Seoul", zone: "Asia/Seoul" },
            { label: "Singapore", zone: "Asia/Singapore" }, { label: "Stockholm", zone: "Europe/Stockholm" },
            { label: "Sydney", zone: "Australia/Sydney" }, { label: "Taipei", zone: "Asia/Taipei" },
            { label: "Tokyo", zone: "Asia/Tokyo" }, { label: "Toronto", zone: "America/Toronto" },
            { label: "Vancouver", zone: "America/Vancouver" }, { label: "Vienna", zone: "Europe/Vienna" },
            { label: "Warsaw", zone: "Europe/Warsaw" }, { label: "Zurich", zone: "Europe/Zurich" },
            { label: "UTC / GMT", zone: "UTC" }
        ].sort((a,b) => a.label.localeCompare(b.label));

        let customTZ = [{ label: 'London', zone: 'Europe/London' }, { label: 'Tokyo', zone: 'Asia/Tokyo' }];
        const savedClocks = localStorage.getItem('family_custom_clocks');
        if (savedClocks) customTZ = JSON.parse(savedClocks);

        function updateClocks() {
            const now = new Date();
            const timeEl = document.getElementById('local-time');
            const dateEl = document.getElementById('local-date');
            if (timeEl) timeEl.textContent = now.toLocaleTimeString('en-GB', { hour12: false });
            if (dateEl) dateEl.textContent = now.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
            
            const container = document.getElementById('work-clocks-container');
            if (container) {
                container.innerHTML = customTZ.map(t => {
                    let time = "--:--";
                    try { time = now.toLocaleTimeString('en-GB', { timeZone: t.zone, hour: '2-digit', minute: '2-digit', hour12: false }); } catch(e) {}
                    return `<div class="flex justify-between items-center bg-gray-800/30 p-4 rounded-xl border border-gray-700/50">
                        <div><p class="text-[9px] text-gray-500 uppercase font-black tracking-widest">${t.label}</p>
                        <p class="text-2xl slim-text text-white">${time}</p></div>
                        <div class="flex items-center gap-4 text-2xl">📍</div></div>`;
                }).join('');
            }
        }

        window.toggleClockSettings = () => {
            const el = document.getElementById('clock-settings');
            el.classList.toggle('hidden');
            if (!el.classList.contains('hidden')) {
                const s1 = document.getElementById('clk-zone-0');
                const s2 = document.getElementById('clk-zone-1');
                [s1, s2].forEach((sel, i) => {
                    sel.innerHTML = TIMEZONES.map(z => `<option value="${z.zone}" ${customTZ[i].zone === z.zone ? 'selected' : ''}>${z.label}</option>`).join('');
                });
            }
        };

        window.saveClocks = () => {
            const s1 = document.getElementById('clk-zone-0');
            const s2 = document.getElementById('clk-zone-1');
            customTZ = [{ label: s1.options[s1.selectedIndex].text, zone: s1.value }, { label: s2.options[s2.selectedIndex].text, zone: s2.value }];
            localStorage.setItem('family_custom_clocks', JSON.stringify(customTZ));
            updateClocks();
            window.toggleClockSettings();
        };

        window.refreshGCal = () => {
            const id = localStorage.getItem('pwa_gcal_id');
            const frame = document.getElementById('gcal-frame');
            if (id && frame) {
                const baseUrl = `https://calendar.google.com/calendar/embed?src=${encodeURIComponent(id)}&ctz=UTC&mode=WEEK&wkst=1&bgcolor=%23ffffff&showTitle=0&showNav=1&showPrint=0&showTabs=1&showCalendars=0&showTz=0`;
                frame.src = baseUrl + "&t=" + new Date().getTime();
            }
        };

        window.toggleGCalSettings = () => document.getElementById('gcal-settings').classList.toggle('hidden');
        window.saveGCal = () => {
            const id = document.getElementById('gcal-id').value.trim();
            if (id) { localStorage.setItem('pwa_gcal_id', id); window.refreshGCal(); window.toggleGCalSettings(); }
        };

        function renderTasks() {
            const members = ['Mom', 'Dad', 'Son', 'Daughter'];
            const container = document.getElementById('tasks-grid');
            if (!container) return;
            
            container.innerHTML = members.map(m => `
                <div class="bg-gray-800/40 p-5 rounded-2xl border border-gray-700/50 flex flex-col h-full">
                    <h3 class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-4 text-center border-b border-gray-700 pb-2">${m}</h3>
                    <div class="space-y-3 flex-grow overflow-y-auto max-h-[300px] pr-1">
                        ${familyTasks.filter(t => t.assignee === m).map(t => `
                            <div class="flex items-center gap-3 bg-black/40 p-3 rounded-xl text-[12px] group transition hover:bg-black/60 ${t.done ? 'opacity-30 line-through grayscale' : ''}">
                                <input type="checkbox" ${t.done ? 'checked' : ''} onchange="window.toggleTask('${t.id}', ${t.done})" class="w-4 h-4 rounded border-gray-700 accent-blue-500 cursor-pointer">
                                <div class="flex flex-col flex-grow">
                                    <span class="font-medium">${t.text}</span>
                                    <span class="text-[9px] text-gray-500 italic mt-1">${t.due ? 'Due: ' + t.due : ''}</span>
                                </div>
                            </div>
                        `).join('') || '<p class="text-[10px] text-gray-600 text-center italic py-4">No pending tasks</p>'}
                    </div>
                </div>`).join('');
        }

        window.toggleTaskForm = () => {
            const form = document.getElementById('add-task-form');
            const btn = document.getElementById('task-form-btn');
            form.classList.toggle('hidden');
            btn.textContent = form.classList.contains('hidden') ? '+ New Task' : 'Close Form';
            btn.classList.toggle('bg-gray-700');
        };

        const startApp = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                onAuthStateChanged(auth, user => {
                    const statusEl = document.getElementById('auth-status');
                    if (user) {
                        if (statusEl) statusEl.textContent = `Sync Active (Live: ${user.uid.substring(0,4)})`;
                        const tasksRef = collection(db, 'artifacts', appId, 'public', 'data', 'tasks');
                        onSnapshot(tasksRef, s => { 
                            familyTasks = []; 
                            s.forEach(d => familyTasks.push({id: d.id, ...d.data()})); 
                            renderTasks(); 
                        }, err => console.error("Task load error", err));
                    }
                });
            } catch (err) { console.error("Init Error", err); }
        };

        document.getElementById('add-task-form').onsubmit = async e => {
            e.preventDefault();
            const text = document.getElementById('task-text').value;
            const assignee = document.getElementById('task-assignee').value;
            const due = document.getElementById('task-due').value;
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'tasks'), { text, assignee, due, done: false });
            e.target.reset(); window.toggleTaskForm();
        };

        window.toggleTask = async (id, status) => { 
            const taskDoc = doc(db, 'artifacts', appId, 'public', 'data', 'tasks', id);
            await updateDoc(taskDoc, { done: !status }); 
        };

        const savedGId = localStorage.getItem('pwa_gcal_id');
        if (savedGId) { document.getElementById('gcal-id').value = savedGId; window.refreshGCal(); }

        setInterval(updateClocks, 1000);
        setInterval(window.refreshGCal, 600000); 
        updateClocks(); startApp();
    </script>
</body>
</html>
